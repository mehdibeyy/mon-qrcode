<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Café le Plaisance</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

<style>

:root {
--gold:#C9A84C;
--gold-lt:#E8D49A;
--cream:#FAF7F2;
--dark:#1C1A17;
--mid:#5A5550;
--card-bg:#FFFFFF;
--radius:18px;
--shadow:0 8px 40px rgba(0,0,0,0.10);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

body{
min-height:100dvh;
background:var(--cream);
font-family:'DM Sans',sans-serif;
color:var(--dark);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:2rem 1.25rem;
}

.container{
width:100%;
max-width:420px;
display:flex;
flex-direction:column;
align-items:center;
gap:2rem;
}

header{
text-align:center;
display:flex;
flex-direction:column;
align-items:center;
gap:.6rem;
}

h1{
font-family:'Playfair Display',serif;
font-size:clamp(2rem,8vw,2.6rem);
font-weight:700;
}

.subtitle{
font-size:.9rem;
color:var(--mid);
font-weight:300;
}

.btn-group{
width:100%;
display:flex;
flex-direction:column;
gap:1rem;
}

.btn{
width:100%;
padding:1.15rem 1.5rem;
border:none;
border-radius:var(--radius);
font-family:'DM Sans',sans-serif;
font-size:1rem;
font-weight:500;
cursor:pointer;
display:flex;
align-items:center;
gap:.9rem;
}

.btn-icon{
width:42px;
height:42px;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
font-size:1.25rem;
}

.btn-text{
display:flex;
flex-direction:column;
gap:.15rem;
}

.btn-label{font-size:1rem;font-weight:500;}
.btn-desc{font-size:.75rem;font-weight:300;opacity:.8;}

.btn-wifi{
background:linear-gradient(135deg,#1C1A17 0%,#2E2A23 100%);
color:#fff;
}

.btn-menu{
background:linear-gradient(135deg,var(--gold) 0%,#B8922A 100%);
color:#fff;
}

.modal-overlay{
display:none;
position:fixed;
inset:0;
background:rgba(28,26,23,.5);
align-items:flex-end;
justify-content:center;
}

.modal-overlay.open{display:flex;}

.modal{
width:100%;
max-width:420px;
background:var(--card-bg);
border-radius:var(--radius) var(--radius) 0 0;
padding:2rem 1.5rem;
display:flex;
flex-direction:column;
gap:1.4rem;
}

.modal-title{
font-family:'Playfair Display',serif;
font-size:1.4rem;
}

.wifi-info{
background:var(--cream);
border-radius:14px;
padding:1.2rem;
display:flex;
flex-direction:column;
gap:1rem;
}

.wifi-row{
display:flex;
flex-direction:column;
gap:.25rem;
}

.wifi-row-label{
font-size:.72rem;
font-weight:500;
letter-spacing:.08em;
color:var(--mid);
text-transform:uppercase;
}

.wifi-row-value{
font-size:1.1rem;
font-weight:500;
}

.btn-copy{
width:100%;
padding:1rem;
border:none;
border-radius:14px;
background:var(--dark);
color:#fff;
cursor:pointer;
}

.btn-lang{
width:100%;
padding:1rem;
border:none;
border-radius:14px;
font-size:1rem;
cursor:pointer;
display:flex;
align-items:center;
gap:.7rem;
}

.lang-fr{
background:linear-gradient(135deg,var(--gold) 0%,#B8922A 100%);
color:white;
}

.lang-en{
background:linear-gradient(135deg,#1C1A17 0%,#2E2A23 100%);
color:white;
}

</style>
</head>

<body>

<div class="container">

<header>
<h1>Café le Plaisance</h1>
<p class="subtitle">Comment puis-je vous aider ?</p>
</header>

<div class="btn-group">

<button class="btn btn-wifi" onclick="openWifi()">
<div class="btn-icon">📶</div>
<div class="btn-text">
<span class="btn-label">Voir le mot de passe WiFi</span>
<span class="btn-desc">Connexion rapide et gratuite</span>
</div>
</button>

<button class="btn btn-menu" onclick="openModal('menuModal')">
<div class="btn-icon">🍽</div>
<div class="btn-text">
<span class="btn-label">Consulter le menu</span>
<span class="btn-desc">Voir nos plats et boissons</span>
</div>
</button>

</div>

</div>

<!-- WIFI -->

<div class="modal-overlay" id="wifiModal" onclick="closeOnOverlay(event,'wifiModal')">
<div class="modal">

<div class="modal-title">📶 Connexion WiFi</div>

<div class="wifi-info">

<div class="wifi-row">
<span class="wifi-row-label">Nom du réseau</span>
<span class="wifi-row-value" id="wifiName"></span>
</div>

<div class="wifi-row">
<span class="wifi-row-label">Mot de passe</span>
<span class="wifi-row-value" id="wifiPassword"></span>
</div>

</div>

<button class="btn-copy" onclick="copyPassword()">📋 Copier le mot de passe</button>

</div>
</div>


<!-- MENU LANGUE -->

<div class="modal-overlay" id="menuModal" onclick="closeOnOverlay(event,'menuModal')">
<div class="modal">

<div class="modal-title">🍽 Choisissez votre langue</div>

<button class="btn-lang lang-fr" onclick="openMenuFr()">
🇫🇷 Menu Français
</button>

<button class="btn-lang lang-en" onclick="openMenuEn()">
🇬🇧 English Menu
</button>

</div>
</div>


<script>

const CONFIG={
wifiName:"MON_WIFI",
wifiPassword:"52hsvqxvdmqh574fq4bdz9",

menuFr:"./carte_fr.pdf",
menuEn:"./carte_en.pdf"
};

document.getElementById("wifiName").textContent=CONFIG.wifiName;
document.getElementById("wifiPassword").textContent=CONFIG.wifiPassword;

function openModal(id){
document.getElementById(id).classList.add("open");
}

function closeModal(id){
document.getElementById(id).classList.remove("open");
}

function closeOnOverlay(e,id){
if(e.target===document.getElementById(id))closeModal(id);
}

function openWifi(){
openModal("wifiModal");
}

function openMenuFr() {
  window.open(new URL(CONFIG.menuFr, window.location.href).href, "_blank");
}

function openMenuEn() {
  window.open(new URL(CONFIG.menuEn, window.location.href).href, "_blank");
}

function copyPassword(){
navigator.clipboard.writeText(CONFIG.wifiPassword);
alert("Mot de passe copié !");
}

</script>

</body>
</html>
